- id: '1772982255001'
  alias: Bridge - Global Presence Recursive Registry Cleaner
  description: Iterates through the Registry with support for Skip-Warning (Transient)
    logic
  triggers:
  - trigger: event
    event_type: start_registry_cleaner
  - trigger: event
    event_type: cleaner_heartbeat
  - trigger: state
    entity_id: sensor.lighting_off_registry
    to: active
  actions:
  - variables:
      registry: '{{ state_attr(''sensor.lighting_off_registry'', ''active_timers'')
        or {} }}'
      current_time: '{{ now() }}'
  - repeat:
      for_each: '{{ registry.items() | list }}'
      sequence:
      - variables:
          area_key: '{{ repeat.item[0] }}'
          data: '{{ repeat.item[1] }}'
          expiry: '{{ as_timestamp(data.expiry) | default(0) }}'
          is_locked: '{{ data.locked }}'
          is_warned: '{{ data.warned }}'
          skip_warning: '{{ data.skip_warning | default(false) }}'
          now_ts: '{{ as_timestamp(now()) }}'
      - variables:
          is_expired: '{{ now_ts >= expiry }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ not is_locked and skip_warning and is_expired }}

              '
          sequence:
          - event: universal_controller_command
            event_data:
              action_type: light_call
              command_input: turn_off
              area_key: '{{ area_key }}'
              source_device: Global Presence Cleaner
          - event: lighting_registry_update
            event_data:
              action: remove
              area_key: '{{ area_key }}'
          - action: logbook.log
            metadata: {}
            data:
              name: Registry Cleaner
              message: Light Call Turn Off Expired
        - conditions:
          - condition: template
            value_template: '{{ not is_locked and not is_warned and not skip_warning
              and is_expired }}'
          sequence:
          - event: universal_controller_command
            event_data:
              action_type: light_call
              command_input: turn_on
              action_value: min
              area_key: '{{ area_key }}'
              source_device: Global Presence Cleaner
          - event: lighting_registry_update
            event_data:
              action: warned
              area_key: '{{ area_key }}'
          - action: logbook.log
            metadata: {}
            data:
              name: Registry Cleaner
              message: Light Call Dim Warning
        - conditions:
          - condition: template
            value_template: '{{ not is_locked and is_warned and is_expired }}'
          sequence:
          - event: universal_controller_command
            event_data:
              action_type: light_call
              command_input: turn_off
              area_key: '{{ area_key }}'
              source_device: Global Presence Cleaner
          - event: lighting_registry_update
            event_data:
              action: remove
              area_key: '{{ area_key }}'
          - action: logbook.log
            metadata: {}
            data:
              name: Registry Cleaner
              message: Light Call Turn Off Expired After Warning
  - if:
    - condition: template
      value_template: '{{ state_attr(''sensor.lighting_off_registry'', ''active_timers'')
        | count > 0 }}'
    then:
    - delay: 00:00:05
    - event: cleaner_heartbeat
  mode: restart
- id: '1772989092630'
  alias: Bridge - Powder Room Presence (Deterministic)
  description: Registry-First Bridge for Powder Room with Overrides
  triggers:
  - trigger: state
    entity_id: binary_sensor.powder_room_door
    id: door
  - trigger: state
    entity_id: binary_sensor.powder_room_motion
    id: motion
  - trigger: state
    entity_id: switch.powder_room_relay
    id: Manual_Toggle
  conditions:
  - condition: template
    value_template: '{% set current = state_attr(''sensor.active_area_overrides'',
      ''overridden_areas'') or [] %} {{ ''powder_room'' not in current }}'
  actions:
  - variables:
      event_ts: '{{ trigger.to_state.last_changed }}'
      is_door_open: '{{ is_state(''binary_sensor.powder_room_door'', ''on'') }}'
      is_motion: '{{ is_state(''binary_sensor.powder_room_motion'', ''on'') }}'
      has_presence_label: '{{ (area_entities(area_key) | select(''target_label'',
        ''presence'') | list | count) > 0 }}

        '
  - choose:
    - conditions:
      - condition: trigger
        id: Manual_Toggle
      - condition: template
        value_template: "{{ trigger.to_state.context.user_id is none and\n   trigger.to_state.context.parent_id
          is none }}"
      sequence:
      - event: lighting_registry_update
        event_data:
          action: remove
          area_key: powder_room
      - event: universal_controller_command
        event_data:
          action_type: light_override
          area_key: powder_room
          command_input: '{{ ''on'' if is_state(''switch.powder_room_relay'', ''on'')
            else ''off'' }}'
    - conditions:
      - condition: trigger
        id: door
      - condition: template
        value_template: '{{ is_door_open }}'
      sequence:
      - event: universal_controller_command
        event_data:
          action_type: light_call
          command_input: turn_on
          area_key: powder_room
          action_value: '{{ ''night_mode'' if is_state(''binary_sensor.night_light_sensor'',
            ''on'') else ''day_mode'' }}'
      - event: lighting_registry_update
        event_data:
          action: add
          area_key: powder_room
          seconds: '{{ 1800 if not has_presence_label else 120 }}'
          timestamp: '{{ event_ts }}'
      - event: start_registry_cleaner
    - conditions:
      - condition: trigger
        id: door
      - condition: template
        value_template: '{{ not is_door_open }}'
      sequence:
      - event: lighting_registry_update
        event_data:
          action: add
          area_key: powder_room
          seconds: '{{ 30 if has_presence_label else 5 }}'
          timestamp: '{{ event_ts }}'
    - conditions:
      - condition: trigger
        id: motion
      - condition: template
        value_template: '{{ is_motion and not is_door_open }}'
      sequence:
      - event: lighting_registry_update
        event_data:
          action: lock
          area_key: powder_room
    - conditions:
      - condition: trigger
        id: motion
      - condition: template
        value_template: '{{ is_motion and is_door_open }}'
      sequence:
      - event: lighting_registry_update
        event_data:
          action: add
          area_key: powder_room
          seconds: 120
          timestamp: '{{ event_ts }}'
  mode: queued
  max: 10
- id: '1773049447479'
  alias: Bridge - Global Presence Orchestrator
  description: Determines 5s/30s/120s/Lock logic. Bayesian + Climate Aware.
  triggers:
  - trigger: state
    entity_id: sensor.active_sensor_monitor_master
  conditions:
  - condition: template
    value_template: "{{ trigger.to_state.state not in ['none', 'unknown', 'unavailable']
      and\n   trigger.from_state.state != trigger.to_state.state }}"
  - condition: template
    value_template: "{% set source_entity = trigger.to_state.state %} \n{% set area
      = area_id(source_entity) %} \n{% set overrides = state_attr('sensor.active_area_overrides',
      'overridden_areas') or [] %} \n{{ area not in overrides }}\n"
  actions:
  - variables:
      source_entity: '{{ trigger.to_state.state.split(''@'')[0] }}'
      area_key: '{{ area_id(source_entity) | default(''none'') }}'
      entity_labels: '{{ labels(source_entity) }}'
      event_ts: '{{ states[source_entity].last_changed }}'
      is_on: '{{ is_state(source_entity, ''on'') }}'
      has_presence_capability: '{{ (area_entities(area_key) | intersect(label_entities(''presence''))
        | count) > 0 }}'
      is_door: '{{ ''door'' in entity_labels }}'
      is_presence: '{{ ''presence'' in entity_labels }}'
      area_policy: '{{ labels(area_key) }}'
      is_night_policy_enabled: '{{ ''night_light'' in area_policy }}'
      house_is_in_night_posture: '{{ is_state(''binary_sensor.night_light_sensor'',
        ''on'') }}'
      use_night_settings: '{{ is_night_policy_enabled and house_is_in_night_posture
        }}'
      final_action_value: '{{ ''night_mode'' if use_night_settings else ''day_mode''
        }}'
      final_target_label: "{% if use_night_settings %} \n  {{ ['night_light'] }} \n{%
        elif is_night_policy_enabled %}\n  {{ ['main'] }} \n{% else %} \n  {{ [] }}
        \n{% endif %}\n"
      door_entity: '{{ (area_entities(area_key) | intersect(label_entities(''door'')))
        | first | default(''none'') }}'
      has_door: '{{ door_entity != ''none'' }}'
      is_lock_zone: '{{ ''lock_eligible'' in area_policy }}'
      registry_entry: '{{ (state_attr(''sensor.lighting_off_registry'', ''active_timers'')
        or {}).get(area_key, {}) }}'
      is_area_locked: '{{ registry_entry.get(''locked'', false) }}'
      peer_area_map:
        mud_room: garage
        garage: mud_room
      adjoining_area: '{{ peer_area_map.get(area_key, ''none'') }}'
      should_trigger_peer: '{{ is_door and is_on and area_key != ''none'' and adjoining_area
        != ''none'' }}'
      hvac_action: '{{ state_attr(''climate.my_ecobee'', ''hvac_action'') | default(''idle'')
        }}'
      fan_running: '{{ is_state_attr(''climate.my_ecobee'', ''fan'', ''on'') }}'
      hvac_is_active: '{{ hvac_action in [''heating'', ''cooling'', ''fan''] or fan_running
        }}'
      door_age: "{% if has_door and states[door_entity] is not none %}\n  {{ as_timestamp(now())
        - as_timestamp(states[door_entity].last_changed, 0) }}\n{% else %}\n  0\n{%
        endif %}\n"
      is_door_closed: '{{ is_state(door_entity, ''off'') if has_door else false }}'
      is_ghost: "{% if not has_door %} \n  {{ false }}\n{% else %}\n  {% set is_closed
        = is_state(door_entity, 'off') %}\n  {{ is_presence and is_on and is_closed
        and (door_age > 600 or hvac_is_active) }}\n{% endif %}\n"
      should_lock_area: "{% if not has_door or 'lock_eligible' not in area_policy
        %} \n  {{ false }}\n{% else %}\n  {% set is_closed = is_state(door_entity,
        'off') %}\n  {{ is_presence and is_on and is_closed and door_age < 360 }}\n{%
        endif %}\n"
  - choose:
    - alias: Veto Log (Ghost Detected)
      conditions:
      - condition: template
        value_template: '{{ is_presence and is_on and is_ghost }}'
      sequence:
      - action: logbook.log
        data:
          name: Bridge Orchestrator
          message: 'GPE VETO: Ghost in {{ area_key }} (HVAC: {{ hvac_action }}, Door
            Age: {{ door_age | int }}s)'
          entity_id: '{{ source_entity }}'
    - alias: Lock Presence (Sabbatical)
      conditions:
      - condition: template
        value_template: '{{ should_lock_area and not is_area_locked }}'
      sequence:
      - event: lighting_registry_update
        event_data:
          action: lock
          area_key: '{{ area_key }}'
      - action: logbook.log
        data:
          name: Bridge Orchestrator
          message: 'GPE: Registry LOCKED'
          entity_id: '{{ source_entity }}'
    - alias: Valid Turn On (Anti-Ghosting)
      conditions:
      - condition: template
        value_template: '{{ (is_door or is_presence) and is_on and not is_area_locked
          and not is_ghost }}'
      sequence:
      - event: universal_controller_command
        event_data:
          action_type: light_call
          command_input: turn_on
          area_key: '{{ area_key }}'
          action_value: '{{ final_action_value }}'
          target_label: '{{ final_target_label }}'
          source_device: monitor
      - event: lighting_registry_update
        event_data:
          action: remove
          area_key: '{{ area_key }}'
          seconds: '{{ 120 if has_presence_capability else 1800 }}'
          timestamp: '{{ event_ts }}'
    - alias: Presence Cleared (Start Cleaner)
      conditions:
      - condition: template
        value_template: '{{ is_presence and not is_on and not is_area_locked }}'
      sequence:
      - event: lighting_registry_update
        event_data:
          action: add
          area_key: '{{ area_key }}'
          seconds: '{{ 120 if has_presence_capability else 1800 }}'
          skip_warning: '{{ not is_lock_zone }}'
          timestamp: '{{ event_ts }}'
      - event: start_registry_cleaner
    - alias: Door Closed Timer Reset
      conditions:
      - condition: template
        value_template: '{{ is_door and not is_on }}'
      sequence:
      - event: lighting_registry_update
        event_data:
          action: add
          area_key: '{{ area_key }}'
          seconds: '{{ 30 if has_presence_capability else 5 }}'
          skip_warning: '{{ not is_lock_zone }}'
          timestamp: '{{ event_ts }}'
    - alias: Presence Update (Door Open)
      conditions:
      - condition: template
        value_template: '{{ is_presence and is_on and (not has_door or is_state(door_entity,
          ''on'')) }}'
      sequence:
      - event: lighting_registry_update
        event_data:
          action: add
          area_key: '{{ area_key }}'
          seconds: 120
          timestamp: '{{ event_ts }}'
  - if:
    - condition: template
      value_template: '{{ should_trigger_peer }}'
    then:
    - event: universal_controller_command
      event_data:
        action_type: light_call
        command_input: turn_on
        area_key: '{{ adjoining_area }}'
        action_value: '{{ final_action_value }}'
        source_device: peer_preheat
  mode: parallel
  max: 20
- id: '1773161819691'
  alias: 'Override: Universal Engine'
  description: Handle manual relay overrides generically based on labels
  triggers:
  - trigger: state
    entity_id: sensor.active_override_source
  conditions:
  - condition: template
    value_template: "{{ trigger.to_state.state not in ['none', 'unknown', 'unavailable']\n
      \  and trigger.from_state.state != trigger.to_state.state \n   and trigger.to_state.context.user_id
      is none \n   and trigger.to_state.context.parent_id is none }}\n"
  actions:
  - variables:
      source_entity: '{{ trigger.to_state.state }}'
      area_key: '{{ area_id(source_entity) | default(''none'') }}'
      src: '{{ states[source_entity] }}'
  - event: universal_controller_command
    event_data:
      action_type: light_override
      area_key: '{{ area_key }}'
      command_input: '{{ states[source_entity].state }}'
      data_payload: '{{ src }}'
  - action: logbook.log
    metadata: {}
    data:
      name: Lighting Override Engine
      message: 'Override for {{ area_key }} State: {{ states[source_entity].state
        }} via UCC Bus'
      entity_id: '{{ source_entity }}'
  mode: parallel
  max: 20
- id: '1773168023699'
  alias: 'Override: Infer from Pico Light Call'
  description: Use Pico turn_on/turn_off in override-eligible areas to toggle override
  triggers:
  - event_type: universal_controller_command
    event_data:
      source_device: pico
      action_type: light_call
    trigger: event
  conditions:
  - condition: template
    value_template: "{% set area_key = trigger.event.data.area_key %} \n{% set cmd
      = trigger.event.data.command_input %} \n{% set areas = label_areas('override_eligible')
      %} \n\n{{ area_key in areas and cmd in ['turn_on', 'turn_off'] }}\n"
  actions:
  - variables:
      area_key: '{{ trigger.event.data.area_key }}'
      cmd: '{{ trigger.event.data.command_input }}'
  - event: universal_controller_command
    event_data:
      action_type: light_override
      area_key: '{{ area_key }}'
      command_input: '{{ ''on'' if cmd == ''turn_on'' else ''off'' }}'
      data_payload: '{{ trigger.event.data }}'
  mode: parallel
- id: '1773168077335'
  alias: 'Override: Expiry & Policy Reaper'
  description: Cleans up manual overrides based on expiry timestamps and area policies
  triggers:
  - trigger: time_pattern
    hours: /1
  actions:
  - variables:
      registry: '{{ state_attr(''sensor.active_area_overrides'', ''override_expiry'')
        or {} }}'
      now_ts: '{{ now().timestamp() | int }}'
  - repeat:
      for_each: '{{ registry.items() | list }}'
      sequence:
      - variables:
          area_key: '{{ repeat.item[0] }}'
          expiry_ts: '{{ repeat.item[1] | int }}'
          area_policy: '{{ labels(area_key) }}'
          is_lock_zone: '{{ ''lock_eligible'' in area_policy }}'
          is_area_locked: '{{ (state_attr(''sensor.lighting_off_registry'', ''active_timers'')
            or {}).get(area_key, {}).get(''locked'', false) }}

            '
          presence_entities: '{{ area_entities(area_key) | intersect(label_entities(''presence''))
            }}'
          is_empty: "{% if presence_entities | length > 0 %}\n  {{ presence_entities
            | select('is_state', 'on') | list | length == 0 }}\n{% else %}\n  true\n{%
            endif %}\n"
      - if:
        - condition: template
          value_template: '{{ expiry_ts <= now_ts and not (is_lock_zone and is_area_locked)
            }}

            '
        then:
        - event: universal_controller_command
          event_data:
            action_type: light_call
            area_key: '{{ area_key }}'
            command_input: turn_off
            source_device: expiry_reaper
            action_value: ''
            target_label: []
            data_payload:
              transition: 20
        - event: universal_controller_command
          event_data:
            action_type: light_override
            area_key: '{{ area_key }}'
            command_input: 'off'
            source_device: expiry_reaper
- id: '1773188066205'
  alias: 'System: Universal Relay Enforcer'
  description: Syncs hardware labeled 'relay' to the state registry
  triggers:
  - trigger: state
    entity_id: sensor.active_relay_source
  conditions:
  - condition: template
    value_template: "{{ trigger.to_state.state not in ['none', 'unknown', 'unavailable']\n
      \  and trigger.from_state.state != trigger.to_state.state \n   and trigger.to_state.context.parent_id
      is none }}\n"
  actions:
  - variables:
      source_entity: '{{ trigger.to_state.state.split(''@'')[0] }}'
      area_key: '{{ area_id(source_entity) | default(''none'') }}'
      src: '{{ states[source_entity] }}'
      desired_states: '{{ state_attr(''sensor.relay_state_registry'', ''relay_state_map'')
        or {} }}'
  - variables:
      physical_state: '{{ states(source_entity) }}'
      target_state: '{{ desired_states.get(source_entity, ''uninitialized'' ) }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.to_state.context.user_id is not none and trigger.to_state.context.parent_id
          is none }}'
      - condition: template
        value_template: "{{ physical_state is not none and \n   physical_state !=
          target_state }}\n"
      sequence:
      - event: set_relay_command
        event_data:
          entity_id: '{{ source_entity }}'
          desired_state: '{{ physical_state }}'
      - action: logbook.log
        data:
          name: 'Relay Enforcer '
          message: Syncing {{ area_key }} desired state ({{ source_entity }}) to {{
            physical_state }}
          entity_id: '{{ source_entity }}'
    - conditions:
      - condition: template
        value_template: '{{ trigger.to_state.context.parent_id is not none or trigger.to_state.context.user_id
          is none }}

          '
      - condition: template
        value_template: "{{ physical_state is not none and \n   physical_state !=
          target_state and\n   target_state in ['on', 'off'] }}\n"
      sequence:
      - if:
        - condition: template
          value_template: '{{ target_state == ''on''}}'
        then:
        - action: switch.turn_on
          target:
            entity_id: '{{ source_entity }}'
          data: {}
        else:
        - action: switch.turn_off
          target:
            entity_id: '{{ source_entity }}'
          data: {}
      - action: logbook.log
        data:
          name: Relay Enforcer
          message: Syncing {{ area_key }} hardware ({{ source_entity }}) to {{ target_state
            }}
          entity_id: '{{ source_entity }}'
    default:
    - stop: '{{ source_entity }} matches target state {{ target_state }}'

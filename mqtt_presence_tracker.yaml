trigger:
  - trigger: mqtt
    topic: "home/presence/deadlines"
sensor:
  - name: "Presence Deadlines"
    unique_id: presence_deadlines_registry
    state: "home/presence/deadlines"
    # We keep the state simple (count of active timers)
    # to stay under the 255-char limit.

    value_template: >
      {% set val = value | from_json if value else {} %}
      {{ val | count }}
    # We store the actual "Crontab" JSON in an attribute
    attributes:
      data: >
      json_attributes_topic: "home/presence/deadlines"
    icon: mdi:clock-recessed

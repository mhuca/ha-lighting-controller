- id: '1771639905319'
  alias: System - Hardware Transition Surgical Sync
  description: Sequential idempotency check to minimize mesh chatter
  triggers:
  - trigger: homeassistant
    event: start
  - trigger: time
    at: 04:00:00
  actions:
  - repeat:
      for_each: "{{ states.number \n   | selectattr('entity_id', 'search', 'on_transition|off_transition|on_off_transition')
        \n   | map(attribute='entity_id') | list }}"
      sequence:
      - variables:
          config_id: '{{ config_entry_id(repeat.item) }}'
          integration: '{{ config_entry_attr(config_id, ''domain'') if config_id else
            ''unknown'' }}'
          target_val: '{% if integration == ''mqtt'' %} 10 {% elif integration ==
            ''matter'' %} 0.1 {% else %} 1 {% endif %}

            '
          current_val: '{{ states(repeat.item) | float(-1) }}'
      - if:
        - condition: template
          value_template: '{{ (current_val - target_val) | abs > 0.01 }}'
        then:
        - action: number.set_value
          target:
            entity_id: '{{ repeat.item }}'
          data:
            value: '{{ target_val }}'
        - delay: 00:00:01
  mode: restart

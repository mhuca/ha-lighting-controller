- id: "1773771624950"
  alias: Universal Matrix Scene Executor V2.9.0
  description: '# UNIVERSAL MATRIX SCENE EXECUTOR (V2.9.2)


    ## 1. CORE PURPOSE


    Executes lighting scene changes locally using the **Processed** profile provided
    by the Node-RED Matrix Processor. This version is "Bus Pure," meaning it exclusively
    listens to the Universal Bus for all commands.


    ## 2. ARCHITECTURAL LOGIC


    * **Bus Integration**: Listens to `home/universal/bus` for unified observability.


    * **Relative Commands**: Supports `next`, `previous`, `raise`, `lower`, `max`,
    `min`.


    * **Absolute Jumps**: Automatically switches to an absolute jump if `action_value`
    is a numeric weight (e.g., from the HA UI Selector).


    * **Restore Logic**: If `action_value` is `restore`, the engine pulls the weight
    from `sensor.[area]_matrix_previous_scene` to return the room to its last state.


    * **Lock Down Logic**: If `action_value` is `lock_down`, the engine physically
    forces all labels to 0 (Off) but suppresses the `mqtt.publish` to preserve logical
    state memory during "Away" postures.


    ## 3. OPERATIONAL NOTES


    * **V2.9.2**: Applied V3.0 Documentation Standards; refined spacing and bold key
    formatting.


    * **V2.9.1**: Integrated `lock_down` physical override with `restore` state logic.


    * **V2.9.0**: Added `restore` logic to leverage the V3.1 Discovery Generator memory.


    * **V2.8.4**: Replaced `home/matrix/+/set` with unified `home/universal/bus`.


    * **V2.8.0**: Removed looping; implemented boundary clamping for Raise/Lower.


    ## 4. DATA DEPENDENCIES


    * **Config**: `sensor.[area_key]_matrix_config`


    * **Memory**: `sensor.[area_key]_matrix_previous_scene`


    * **State**: `state_attr(g_logic.scene_data, ''data'')`


    ## 5. YAML STANDARDS (PROJECT WIDE)


    * **Self-Documentation**: All critical automations must include Markdown-formatted
    documentation in the `description` block.


    * **Code References**: Use backticks ` for entity IDs, attributes, or technical
    slugs (e.g., `area_id`, `weight_0`).'
  triggers:
    - trigger: event
      event_type: universal_controller_command
      event_data:
        action_type: scene_cycle
    - trigger: mqtt
      id: MQTT_Message
      topic: home/universal/bus
  actions:
    - variables:
        registry:
          "{% set reg = state_attr('sensor.global_variable_registry', 'vars')
          %} \n{{ reg if reg is not none else {} }}\n"
        g_logic: "{{ registry.get('globals', {}).get('logic_engines', {}) }}"
        is_ready: "{{ g_logic != {} }}"
    - condition: template
      value_template: "{{ is_ready }}"
    - variables:
        payload:
          "{{ trigger.payload_json if trigger.id == 'MQTT_Message' else trigger.event.data
          }}"
        area: "{{ payload.area_key }}"
        action: "{{ payload.action_value | default('next') }}"
        restore_val:
          "{% if action == 'restore' %}\n  {% set prev = states('sensor.'
          ~ area ~ '_matrix_previous_scene') %}\n  {{ prev.split(':')[0] | int(-1) if
          prev not in ['unknown', 'unavailable'] else -1 }}\n{% else %}\n  -1\n{% endif
          %}"
        target_weight:
          "{{ restore_val if action == 'restore' else action | int(-1)
          }}"
        is_jump: "{{ target_weight >= 0 }}"
        is_lock_down: "{{ action == 'lock_down' }}"
        matrix_sensor:
          "{{ state_attr('sensor.' ~ area ~ '_matrix_config', 'scenes')
          | default({}, true) }}"
        matrix_list:
          "{{ matrix_sensor.values() | sort(attribute='sequence_weight')
          | list }}"
        current_scene_data:
          "{{ state_attr(g_logic.scene_data, 'data') | default({},
          true) }}"
        current_state_obj:
          "{{ current_scene_data.get(area, {\n  \"name\": \"off\",\n
          \ \"sequence_weight\": 0\n}) }}"
        current_scene_name: "{{ current_state_obj.name | default('off') }}"
        current_scene:
          "{% set match = matrix_list \n  | selectattr('name', 'eq', current_scene_name)
          \n  | first \n  | default(none) %}\n{{ match if match is not none else (matrix_list[0]
          if matrix_list | length > 0 else none) }}\n"
        next_scene:
          "{% set weight = current_scene.sequence_weight | default(0) | int
          %}\n{% if is_jump %}\n  {{ matrix_list | selectattr('sequence_weight', 'eq',
          target_weight) | first | default(current_scene) }}\n{% elif action in ['raise',
          'next'] %}\n  {{ matrix_list | selectattr('sequence_weight', 'gt', weight)
          | sort(attribute='sequence_weight') | first | default(current_scene) }}\n{%
          elif action in ['lower', 'previous'] %}\n  {{ matrix_list | selectattr('sequence_weight',
          'lt', weight) | sort(attribute='sequence_weight') | last | default(current_scene)
          }}\n{% elif action == 'max' %}\n  {{ matrix_list | last }}\n{% elif action
          in ['min'] %}\n  {{ matrix_list | selectattr('sequence_weight', 'gt', 0) |
          sort(attribute='sequence_weight') | first | default(matrix_list | first) }}\n{%
          elif action in ['off','lock_down'] %}\n  {{ matrix_list | first }}\n{% else
          %}\n  {{ current_scene }}\n{% endif %}\n"
    - condition: template
      value_template: "{{ next_scene is not none }}"
    - repeat:
        until:
          - condition: template
            value_template:
              "{{ repeat.index >= (next_scene.primary.keys() | list | length
              if next_scene.primary is mapping else 1) }}"
        sequence:
          - variables:
              is_map: "{{ next_scene.primary is mapping }}"
              target:
                "{% if is_map %}\n  {% set key = (next_scene.primary.keys() | list)[repeat.index
                - 1] %}\n  {{ [key] }}\n{% else %}\n  {{ [\"all\"] }}\n{% endif %}"
              val:
                "{% if is_map %}\n  {{ (next_scene.primary.values() | list)[repeat.index
                - 1] }}\n{% else %}\n  {{ next_scene.primary | default(0) }}\n{% endif
                %}"
          - event: universal_controller_command
            event_data:
              source_device: matrix_engine
              action_type: light_call
              area_key: "{{ area }}"
              target_label: "{{ target }}"
              action_value: "{{ val | int(0) if val != '' else '' }}"
              command_input:
                "{{ 'turn_off' if val | int(0) == 0 and val != '' else
                'turn_on' }}"
    - repeat:
        until:
          - condition: template
            value_template:
              "{{ repeat.index >= (next_scene.links.keys() | list | length
              if next_scene.links is mapping else 1) }}"
        sequence:
          - variables:
              link_area:
                "{{ (next_scene.links.keys() | list)[repeat.index - 1] if next_scene.links
                is mapping else none }}"
              link_data:
                "{{ (next_scene.links.values() | list)[repeat.index - 1] if next_scene.links
                is mapping else none }}"
          - condition: template
            value_template: "{{ link_area is not none }}"
          - repeat:
              until:
                - condition: template
                  value_template:
                    "{{ repeat.index >= (link_data.keys() | list | length
                    if link_data is mapping else 1) }}

                    "
              sequence:
                - variables:
                    is_map: "{{ link_data is mapping }}"
                    target:
                      "{% if is_map %}\n  {% set key = (link_data.keys() | list)[repeat.index
                      - 1] %}\n  {{ [key] }}\n{% else %}\n  {{ [\"all\"] }}\n{% endif %}"
                    val:
                      "{% if is_map %}\n  {{ (link_data.values() | list)[repeat.index
                      - 1] }}\n{% else %}\n  {{ link_data | default(0) }}\n{% endif %}"
                - event: universal_controller_command
                  event_data:
                    source_device: matrix_engine_link
                    action_type: light_call
                    area_key: "{{ link_area }}"
                    target_label: "{{ target }}"
                    action_value: "{{ val | int(0) if val != '' else '' }}"
                    command_input:
                      "{{ 'turn_off' if val | int(0) == 0 and val != ''
                      else 'turn_on' }}"
    - if:
        - condition: template
          value_template: "{{ not is_lock_down }}"
      then:
        - action: mqtt.publish
          data:
            topic: home/lighting/{{ area }}/current_scene
            retain: true
            payload:
              "{\n  \"name\": \"{{ next_scene.name }}\",\n  \"sequence_weight\":
              {{ next_scene.sequence_weight }}\n}\n"
  mode: restart

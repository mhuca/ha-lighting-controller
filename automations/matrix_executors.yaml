    If navigation hits the end of the `sequence_weight` list, \n  the command is ignored
    (clamped).\n\n\n## 3. OPERATIONAL NOTES\n* **V2.8.4**: Replaced `home/matrix/+/set`
    with unified `home/universal/bus` \n  triggering for better system observability.\n\n*
    **V2.8.3**: Integrated MQTT UI Bridge logic and added Absolute Weight Jump.\n*
    **V2.8.2**: Fixed Markdown rendering issues for HA UI compatibility.\n* **V2.8.1**:
    Cleaned up internal documentation and formatting.\n* **V2.8**: Removed looping;

- id: "1773782933954"
  alias: Global Presence Engine - Orchestrator
  description:
    "# GPE ORCHESTRATOR (V3.2)\n\n## 1. CORE PURPOSE\n\nDetermines area
    occupancy and manages lighting/security transitions.  Uses Bayesian-lite logic
    (Door Age + HVAC) to prevent \"Ghosting.\"\n\n## 2. V3.2 SECURITY EVOLUTION\n\n*
    **Posture Awareness**: Integrated with `global_posture_sensor`.\n\n* **Security
    Divergence**: If Posture is `away`, motion triggers security \n  logic instead
    of simple lighting calls.\n\n\n* **Perimeter Priming**: Uses `security_status`
    in the Global Registry \n  to verify intruders. Internal rooms (like Powder Room)
    only trigger \n  the alarm if a perimeter area was breached first.\n\n\n## 3.
    DATA DEPENDENCIES\n\n* **Registry**: `sensor.global_variable_registry`\n\n* **Alarm**:
    `alarm_control_panel.house_alarm`"
  triggers:
    - trigger: state
      entity_id: sensor.active_sensor_monitor_master
  conditions:
    - condition: template
      value_template:
        "{{ trigger.to_state.state not in ['none', 'unknown', 'unavailable']
        and\n   trigger.from_state.state != trigger.to_state.state }}"
    - condition: template
      value_template:
        "{% set source_entity = trigger.to_state.state %} \n{% set area
        = area_id(source_entity) %} \n{% set overrides = state_attr('sensor.active_area_overrides',
        'overridden_areas') or [] %} \n{{ area not in overrides }}\n"
  actions:
    - variables:
        registry:
          "{% set r = state_attr('sensor.global_variable_registry', 'vars')
          %} {{ r if r is not none else {} }}"
        g_env: "{{ registry.get('globals', {}).get('environmental', {}) }}"
        g_hvac: "{{ registry.get('globals', {}).get('hvac', {}) }}"
        g_logic: "{{ registry.get('globals', {}).get('logic_engines', {}) }}"
        is_ready: "{{ g_env != {} }}"
    - condition: template
      value_template: "{{ is_ready }}"
    - variables:
        source_entity: "{{ trigger.to_state.state.split('@')[0] }}"
        area_key: "{{ area_id(source_entity) | default('none') }}"
        entity_labels: "{{ labels(source_entity) }}"
        event_ts: "{{ states[source_entity].last_changed }}"
        is_on: "{{ is_state(source_entity, 'on') }}"
        has_presence_capability:
          "{{ (area_entities(area_key) | intersect(label_entities('presence'))
          | count) > 0 }}"
        is_presence: "{{ 'presence' in entity_labels }}"
        area_policy: "{{ labels(area_key) }}"
        is_night_policy_enabled: "{{ 'night_light' in area_policy }}"
        house_is_in_night_posture:
          "{{ is_state(g_env.night_posture_sensor, 'on')
          }}"
        use_night_settings:
          "{{ is_night_policy_enabled and house_is_in_night_posture
          }}"
        final_action_value:
          "{{ 'night_mode' if use_night_settings else 'day_mode'
          }}"
        final_target_label:
          "{% if use_night_settings %} \n  {{ ['night_light'] }} \n{%
          elif is_night_policy_enabled %}\n  {{ ['main'] }} \n{% else %} \n  {{ [] }}
          \n{% endif %}\n"
        adjoining_area:
          "{{ registry.area_metadata.get(area_key, {}).get('neighbors',
          {}).get('peer', 'none') }}"
        is_entrance: "{{ 'entrance' in entity_labels }}"
        is_door: "{{ 'door' in entity_labels }}"
        door_entity:
          "{{ (area_entities(area_key) | intersect(label_entities('door')))
          | first | default('none') }}"
        has_door: "{{ door_entity != 'none' }}"
        is_lock_zone: "{{ 'lock_eligible' in area_policy }}"
        registry_entry:
          "{{ (state_attr(g_logic.lighting_off_registry, 'active_timers')
          or {}).get(area_key, {}) }}"
        is_area_locked: "{{ registry_entry.get('locked', false) }}"
        should_trigger_peer:
          "{{ is_door and is_on and area_key != 'none' and adjoining_area
          != 'none' }}"
        hvac_action:
          "{{ state_attr(g_hvac.primary_unit, 'hvac_action') | default('idle')
          }}"
        fan_running: "{{ is_state_attr(g_hvac.primary_unit, 'fan', 'on') }}"
        hvac_is_active: "{{ hvac_action in g_hvac.monitored_states or fan_running }}"
        door_age:
          "{% if has_door and states[door_entity] is not none %}\n  {{ as_timestamp(now())
          - as_timestamp(states[door_entity].last_changed, 0) }}\n{% else %}\n  0\n{%
          endif %}\n"
        is_door_closed: "{{ is_state(door_entity, 'off') if has_door else false }}"
        is_privacy_zone: "{{ has_door and 'lock_eligible' in area_policy }}"
        is_ghost:
          "{% if not has_door %} \n  {{ false }}\n{% else %}\n  {{ is_presence
          and is_on and is_door_closed and not is_area_locked and (door_age > 600 or
          hvac_is_active) }}\n{% endif %}\n"
        should_lock_area:
          "{% if not is_privacy_zone %}\n  {{ false }}\n{% else %}\n
          \ {{ is_presence and is_on and is_door_closed and not is_area_locked and door_age
          < 120 }}\n{% endif %}\n"
        should_unlock_area:
          "{% if is_area_locked %}\n   {# Safety: Clear lock if motion
          stops OR if the door is physically opened #}\n   {{ not is_on or (has_door
          and not is_door_closed) }}\n{% else %}\n   {{ false }}\n{% endif %}\n"
    - choose:
        - alias: Veto Log (Ghost Detected)
          conditions:
            - condition: template
              value_template: "{{ is_presence and is_on and is_ghost }}"
          sequence:
            - action: logbook.log
              data:
                name: GPE VETO
                message:
                  "GPE VETO: Ghost in {{ area_key }} (HVAC: {{ hvac_action }}, Door
                  Age: {{ door_age | int }}s, Lock Status: {{ is_area_locked}})"
                entity_id: "{{ source_entity }}"
        - alias: Lock Presence (Sabbatical)
          conditions:
            - condition: template
              value_template: "{{ should_lock_area and not is_area_locked }}"
          sequence:
            - event: lighting_registry_update
              event_data:
                action: lock
                area_key: "{{ area_key }}"
            - action: logbook.log
              data:
                name: GPE LOCKED
                message:
                  "Locked Via {{ 'Motion' if is_presence else 'Portal' }} Room
                  {{ area_key }} (Registry Reset{% if has_door %}, Door Age: {{ door_age
                  | int }}s{% endif %})"
                entity_id: "{{ source_entity }}"
        - alias: Valid Turn On (Anti-Ghosting)
          conditions:
            - condition: template
              value_template:
                "{{ (is_entrance or is_door or (is_presence and not is_area_locked))
                and is_on and not is_ghost }}"
          sequence:
            - event: universal_controller_command
              event_data:
                action_type: light_call
                command_input: turn_on
                area_key: "{{ area_key }}"
                action_value: "{{ final_action_value }}"
                target_label: "{{ final_target_label }}"
                source_device: monitor
            - event: lighting_registry_update
              event_data:
                action: remove
                area_key: "{{ area_key }}"
            - action: logbook.log
              data:
                name: GPE
                message:
                  "Turn On: Via {{'Motion' if is_presence else 'Portal' }} Room
                  {{ area_key }} (Registry Reset, Door Age: {{ door_age | int }}s)"
                entity_id: "{{ source_entity }}"
            - if:
                - condition: template
                  value_template: "{{ is_door and has_presence_capability }}"
              then:
                - event: lighting_registry_update
                  event_data:
                    action: add
                    area_key: "{{ area_key }}"
                    seconds: 10
                    timestamp: "{{ event_ts }}"
        - alias: Presence Cleared (Start Cleaner)
          conditions:
            - condition: template
              value_template: "{{ is_presence and not is_on and not is_area_locked }}"
          sequence:
            - event: lighting_registry_update
              event_data:
                action: add
                area_key: "{{ area_key }}"
                seconds: "{{ 120 if has_presence_capability else 1800 }}"
                skip_warning: "{{ not is_lock_zone }}"
                timestamp: "{{ event_ts }}"
            - event: start_registry_cleaner
            - action: logbook.log
              data:
                name: "GPE Start "
                message:
                  'GPE: Start Cleaner {{ area_key }} Seconds: "{{ 120 if has_presence_capability
                  else 1800 }}" Skip Warning: "{{ not is_lock_zone }}"'
                entity_id: "{{ source_entity }}"
        - alias: Door Closed Timer Reset
          conditions:
            - condition: template
              value_template: "{{ is_door and not is_on }}"
          sequence:
            - event: lighting_registry_update
              event_data:
                action: add
                area_key: "{{ area_key }}"
                seconds: "{{ 30 if has_presence_capability else 5 }}"
                skip_warning: "{{ not is_lock_zone }}"
                timestamp: "{{ event_ts }}"
            - action: logbook.log
              data:
                name: GPE Add
                message:
                  'GPE: Door Warning {{ area_key }} seconds: "{{ 30 if has_presence_capability
                  else 5 }}" skip_warning: "{{ not is_lock_zone }}"'
                entity_id: "{{ source_entity }}"
        - alias: Presence Update (Door Open)
          conditions:
            - condition: template
              value_template:
                "{{ is_presence and is_on and (not has_door or not is_door_closed
                ) }}"
          sequence:
            - event: lighting_registry_update
              event_data:
                action: add
                area_key: "{{ area_key }}"
                seconds: 120
                timestamp: "{{ event_ts }}"
            - action: logbook.log
              data:
                name: GPE Add
                message: "GPE: Reset {{ area_key }} Time Added 120s"
                entity_id: "{{ source_entity }}"
        - alias: Safety Unlock (Self-Healing)
          conditions:
            - condition: template
              value_template: "{{ should_unlock_area }}"
          sequence:
            - event: lighting_registry_update
              event_data:
                action: remove
                area_key: "{{ area_key }}"
              enabled: false
    - if:
        - condition: template
          value_template: "{{ should_trigger_peer }}"
      then:
        - event: universal_controller_command
          event_data:
            action_type: light_call
            command_input: turn_on
            area_key: "{{ adjoining_area }}"
            action_value: "{{ final_action_value }}"
            source_device: peer_preheat
  mode: parallel
  max: 20
- id: "1773782981035"
  alias: Global Presence Engine - Recursive Registry Cleaner
  description:
    Iterates through the Registry with support for Skip-Warning (Transient)
    logic
  triggers:
    - trigger: event
      event_type: start_registry_cleaner
    - trigger: event
      event_type: esphome.start_registry_cleaner
    - trigger: event
      event_type: cleaner_heartbeat
    - trigger: state
      entity_id: sensor.lighting_off_registry
      to: active
  conditions: []
  actions:
    - variables:
        global_vars: "{{ state_attr('sensor.global_variable_registry', 'vars') }}"
        g_logic: "{{ global_vars.globals.logic_engines }}"
        target_registry: "{{ g_logic.lighting_off_registry }}"
        log_dest: "{{ g_logic.system_log }}"
        registry_data: "{{ state_attr(target_registry, 'active_timers') or {} }}"
        current_time: "{{ now() }}"
    - repeat:
        for_each: "{{ registry_data.items() | list }}"
        sequence:
          - variables:
              area_key: "{{ repeat.item[0] }}"
              data: "{{ repeat.item[1] }}"
              expiry: "{{ as_timestamp(data.expiry) | default(0) }}"
              is_locked: "{{ data.locked }}"
              is_warned: "{{ data.warned }}"
              skip_warning: "{{ data.skip_warning | default(false) }}"
              now_ts: "{{ as_timestamp(now()) }}"
              is_expired: "{{ now_ts >= expiry }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ is_locked or not is_expired }}"
                sequence: []
              - conditions:
                  - condition: template
                    value_template: "{{ skip_warning }}"
                sequence:
                  - event: universal_controller_command
                    event_data:
                      action_type: light_call
                      command_input: turn_off
                      area_key: "{{ area_key }}"
                      source_device: Global Presence Cleaner
                  - event: lighting_registry_update
                    event_data:
                      action: remove
                      area_key: "{{ area_key }}"
                  - action: logbook.log
                    data:
                      name: Registry Cleaner
                      message: Light Call Turn Off (Transient/Skip) for {{ area_key }}
                      entity_id: "{{ log_dest }}"
              - conditions:
                  - condition: template
                    value_template: "{{ not is_warned }}"
                sequence:
                  - event: universal_controller_command
                    event_data:
                      action_type: light_call
                      command_input: turn_on
                      action_value: min
                      area_key: "{{ area_key }}"
                      source_device: Global Presence Cleaner
                  - event: lighting_registry_update
                    event_data:
                      action: warned
                      area_key: "{{ area_key }}"
                  - action: logbook.log
                    data:
                      name: Registry Cleaner
                      message: Light Call Dim Warning for {{ area_key }}
                      entity_id: "{{ log_dest }}"
              - conditions:
                  - condition: template
                    value_template: "{{ is_warned }}"
                sequence:
                  - event: universal_controller_command
                    event_data:
                      action_type: light_call
                      command_input: turn_off
                      area_key: "{{ area_key }}"
                      source_device: Global Presence Cleaner
                  - event: lighting_registry_update
                    event_data:
                      action: remove
                      area_key: "{{ area_key }}"
                  - action: logbook.log
                    data:
                      name: Registry Cleaner
                      message: Light Call Turn Off After Warning for {{ area_key }}
                      entity_id: "{{ log_dest }}"
    - if:
        - condition: template
          value_template:
            "{{ (state_attr(target_registry, 'active_timers') or {}) |
            count > 0 }}"
      then:
        - delay: 00:00:05
        - event: cleaner_heartbeat
  mode: restart
- id: "1773800605141"
  alias: Global Presence Engine - Posture Manager V1.2
  description: "# GPE POSTURE MANAGER (V1.2)


    ## 1. CORE PURPOSE


    Manages global house states (Home, Away, Night) and orchestrates the transitions
    between them. Acts as the bridge between raw sensor data and the Alarm Panel.


    ## 2. LOGIC FLOWS


    * **Arrival**: Perimeter sensor + House is Away -> Start Entry Delay.


    * **Departure**: Posture set to Away -> Snapshot current scenes -> Trigger Area
    `lock_down`.


    * **Night**: Syncs Night Posture with GPE lighting profiles.


    ## 3. DATA DEPENDENCIES


    * **Registry**: `sensor.global_variable_registry`


    * **Alarm**: `alarm_control_panel.house_alarm`


    ## 4. INTEGRATION NOTES


    * **V1.2**: Standardized documentation to V3.0 standards; verified `lock_down`
    action value for physical-only clear.


    * **V1.1**: Replaced blanket commands with registry-driven loops."
  triggers:
    - trigger: state
      entity_id: sensor.active_sensor_monitor_master
      id: monitor_event
    - trigger: state
      entity_id: alarm_control_panel.house_alarm
      id: alarm_state_change
  actions:
    - variables:
        registry:
          "{% set r = state_attr('sensor.global_variable_registry', 'vars')
          %} \n{{ r if r is not none else {} }}\n"
        g_env: "{{ registry.get('globals', {}).get('environmental', {}) }}"
        posture_entity: "{{ g_env.global_posture_sensor }}"
        current_posture: "{{ states(posture_entity) }}"
        source_entity:
          "{{ trigger.to_state.state.split('@')[0] if trigger.id == 'monitor_event'
          else 'none' }}"
        area_key: "{{ area_id(source_entity) | default('none') }}"
        entity_labels: "{{ labels(source_entity) }}"
        is_perimeter:
          "{{ 'perimeter' in labels(area_key) or 'entrance' in entity_labels
          }}"
    - choose:
        - alias: "Arrival: Perimeter Breach while Away"
          conditions:
            - condition: template
              value_template:
                "{{ trigger.id == 'monitor_event' and current_posture ==
                'away' and is_perimeter }}"
          sequence:
            - action: logbook.log
              data:
                name: GPE POSTURE
                message: Perimeter breach in {{ area_key }}. Starting entry sequence.
        - alias: "Departure: Posture set to Away"
          conditions:
            - condition: template
              value_template:
                "{{ trigger.id == 'alarm_state_change' and \n   trigger.to_state.state
                == 'armed_away' }}"
          sequence:
            - action: logbook.log
              data:
                name: GPE POSTURE
                message: House Armed Away. Snapshotting states and executing area lock_down.
            - event: universal_controller_command
              event_data:
                action_type: snapshot_all_areas
                source_device: posture_manager
            - repeat:
                for_each: "{{ registry.area_metadata.keys() | list }}"
                sequence:
                  - event: universal_controller_command
                    event_data:
                      action_type: scene_cycle
                      action_value: lock_down
                      area_key: "{{ repeat.item }}"
                      source_device: posture_manager
        - alias: "Return: Alarm Disarmed"
          conditions:
            - condition: template
              value_template:
                "{{ trigger.id == 'alarm_state_change' and \n   trigger.to_state.state
                == 'disarmed' }}"
          sequence:
            - event: global_registry_update
              event_data:
                path: globals.environmental.global_posture
                value: home
            - event: universal_controller_command
              event_data:
                action_type: scene_cycle
                action_value: restore
                area_key: entrance
  mode: restart
- id: "1772982255001"
  alias: Bridge - Global Presence Recursive Registry Cleaner
  description:
    Iterates through the Registry with support for Skip-Warning (Transient)
    logic
  triggers:
    - trigger: event
      event_type: start_registry_cleaner
    - trigger: event
      event_type: esphome.start_registry_cleaner
    - trigger: event
      event_type: cleaner_heartbeat
    - trigger: state
      entity_id: sensor.lighting_off_registry
      to: active
  actions:
    - variables:
        global_vars: "{{ state_attr('sensor.global_variable_registry', 'vars') }}"
        g_logic: "{{ global_vars.globals.logic_engines }}"
        target_registry: "{{ g_logic.lighting_off_registry }}"
        log_dest: "{{ g_logic.system_log }}"
        registry_data: "{{ state_attr(target_registry, 'active_timers') or {} }}"
        current_time: "{{ now() }}"
    - repeat:
        for_each: "{{ registry_data.items() | list }}"
        sequence:
          - variables:
              area_key: "{{ repeat.item[0] }}"
              data: "{{ repeat.item[1] }}"
              expiry: "{{ as_timestamp(data.expiry) | default(0) }}"
              is_locked: "{{ data.locked }}"
              is_warned: "{{ data.warned }}"
              skip_warning: "{{ data.skip_warning | default(false) }}"
              now_ts: "{{ as_timestamp(now()) }}"
              is_expired: "{{ now_ts >= expiry }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ is_locked or not is_expired }}"
                sequence: []
              - conditions:
                  - condition: template
                    value_template: "{{ skip_warning }}"
                sequence:
                  - event: universal_controller_command
                    event_data:
                      action_type: light_call
                      command_input: turn_off
                      area_key: "{{ area_key }}"
                      source_device: Global Presence Cleaner
                  - event: lighting_registry_update
                    event_data:
                      action: remove
                      area_key: "{{ area_key }}"
                  - action: logbook.log
                    data:
                      name: Registry Cleaner
                      message: Light Call Turn Off (Transient/Skip) for {{ area_key }}
                      entity_id: "{{ log_dest }}"
              - conditions:
                  - condition: template
                    value_template: "{{ not is_warned }}"
                sequence:
                  - event: universal_controller_command
                    event_data:
                      action_type: light_call
                      command_input: turn_on
                      action_value: min
                      area_key: "{{ area_key }}"
                      source_device: Global Presence Cleaner
                  - event: lighting_registry_update
                    event_data:
                      action: warned
                      area_key: "{{ area_key }}"
                  - action: logbook.log
                    data:
                      name: Registry Cleaner
                      message: Light Call Dim Warning for {{ area_key }}
                      entity_id: "{{ log_dest }}"
              - conditions:
                  - condition: template
                    value_template: "{{ is_warned }}"
                sequence:
                  - event: universal_controller_command
                    event_data:
                      action_type: light_call
                      command_input: turn_off
                      area_key: "{{ area_key }}"
                      source_device: Global Presence Cleaner
                  - event: lighting_registry_update
                    event_data:
                      action: remove
                      area_key: "{{ area_key }}"
                  - action: logbook.log
                    data:
                      name: Registry Cleaner
                      message: Light Call Turn Off After Warning for {{ area_key }}
                      entity_id: "{{ log_dest }}"
    - if:
        - condition: template
          value_template:
            "{{ (state_attr(target_registry, 'active_timers') or {}) |
            count > 0 }}"
      then:
        - delay: 00:00:05
        - event: cleaner_heartbeat
  mode: restart
- id: "1772989092630"
  alias: Bridge - Powder Room Presence (Deterministic)
  description: Registry-First Bridge for Powder Room with Overrides
  triggers:
    - trigger: state
      entity_id: binary_sensor.powder_room_door
      id: door
    - trigger: state
      entity_id: binary_sensor.powder_room_motion
      id: motion
    - trigger: state
      entity_id: switch.powder_room_relay
      id: Manual_Toggle
  conditions:
    - condition: template
      value_template:
        "{% set current = state_attr('sensor.active_area_overrides',
        'overridden_areas') or [] %} {{ 'powder_room' not in current }}"
  actions:
    - variables:
        event_ts: "{{ trigger.to_state.last_changed }}"
        is_door_open: "{{ is_state('binary_sensor.powder_room_door', 'on') }}"
        is_motion: "{{ is_state('binary_sensor.powder_room_motion', 'on') }}"
        has_presence_label:
          "{{ (area_entities(area_key) | select('target_label',
          'presence') | list | count) > 0 }}

          "
    - choose:
        - conditions:
            - condition: trigger
              id: Manual_Toggle
            - condition: template
              value_template:
                "{{ trigger.to_state.context.user_id is none and\n   trigger.to_state.context.parent_id
                is none }}"
          sequence:
            - event: lighting_registry_update
              event_data:
                action: remove
                area_key: powder_room
            - event: universal_controller_command
              event_data:
                action_type: light_override
                area_key: powder_room
                command_input:
                  "{{ 'on' if is_state('switch.powder_room_relay', 'on')
                  else 'off' }}"
        - conditions:
            - condition: trigger
              id: door
            - condition: template
              value_template: "{{ is_door_open }}"
          sequence:
            - event: universal_controller_command
              event_data:
                action_type: light_call
                command_input: turn_on
                area_key: powder_room
                action_value:
                  "{{ 'night_mode' if is_state('binary_sensor.night_light_sensor',
                  'on') else 'day_mode' }}"
            - event: lighting_registry_update
              event_data:
                action: add
                area_key: powder_room
                seconds: "{{ 1800 if not has_presence_label else 120 }}"
                timestamp: "{{ event_ts }}"
            - event: start_registry_cleaner
        - conditions:
            - condition: trigger
              id: door
            - condition: template
              value_template: "{{ not is_door_open }}"
          sequence:
            - event: lighting_registry_update
              event_data:
                action: add
                area_key: powder_room
                seconds: "{{ 30 if has_presence_label else 5 }}"
                timestamp: "{{ event_ts }}"
        - conditions:
            - condition: trigger
              id: motion
            - condition: template
              value_template: "{{ is_motion and not is_door_open }}"
          sequence:
            - event: lighting_registry_update
              event_data:
                action: lock
                area_key: powder_room
        - conditions:
            - condition: trigger
              id: motion
            - condition: template
              value_template: "{{ is_motion and is_door_open }}"
          sequence:
            - event: lighting_registry_update
              event_data:
                action: add
                area_key: powder_room
                seconds: 120
                timestamp: "{{ event_ts }}"
  mode: queued
  max: 10
- id: "1773049447479"
  alias: Bridge - Global Presence Orchestrator
  description: Determines 5s/30s/120s/Lock logic. Bayesian + Climate Aware.
  triggers:
    - trigger: state
      entity_id: sensor.active_sensor_monitor_master
  conditions:
    - condition: template
      value_template:
        "{{ trigger.to_state.state not in ['none', 'unknown', 'unavailable']
        and\n   trigger.from_state.state != trigger.to_state.state }}"
    - condition: template
      value_template:
        "{% set source_entity = trigger.to_state.state %} \n{% set area
        = area_id(source_entity) %} \n{% set overrides = state_attr('sensor.active_area_overrides',
        'overridden_areas') or [] %} \n{{ area not in overrides }}\n"
  actions:
    - variables:
        registry:
          "{% set r = state_attr('sensor.global_variable_registry', 'vars')
          %} {{ r if r is not none else {} }}"
        g_env: "{{ registry.get('globals', {}).get('environmental', {}) }}"
        g_hvac: "{{ registry.get('globals', {}).get('hvac', {}) }}"
        g_logic: "{{ registry.get('globals', {}).get('logic_engines', {}) }}"
        is_ready: "{{ g_env != {} }}"
    - condition: template
      value_template: "{{ is_ready }}"
    - variables:
        source_entity: "{{ trigger.to_state.state.split('@')[0] }}"
        area_key: "{{ area_id(source_entity) | default('none') }}"
        entity_labels: "{{ labels(source_entity) }}"
        event_ts: "{{ states[source_entity].last_changed }}"
        is_on: "{{ is_state(source_entity, 'on') }}"
        has_presence_capability:
          "{{ (area_entities(area_key) | intersect(label_entities('presence'))
          | count) > 0 }}"
        is_presence: "{{ 'presence' in entity_labels }}"
        area_policy: "{{ labels(area_key) }}"
        is_night_policy_enabled: "{{ 'night_light' in area_policy }}"
        house_is_in_night_posture:
          "{{ is_state(g_env.night_posture_sensor, 'on')
          }}"
        use_night_settings:
          "{{ is_night_policy_enabled and house_is_in_night_posture
          }}"
        final_action_value:
          "{{ 'night_mode' if use_night_settings else 'day_mode'
          }}"
        final_target_label:
          "{% if use_night_settings %} \n  {{ ['night_light'] }} \n{%
          elif is_night_policy_enabled %}\n  {{ ['main'] }} \n{% else %} \n  {{ [] }}
          \n{% endif %}\n"
        adjoining_area:
          "{{ registry.area_metadata.get(area_key, {}).get('neighbors',
          {}).get('peer', 'none') }}"
        is_entrance: "{{ 'entrance' in entity_labels }}"
        is_door: "{{ 'door' in entity_labels }}"
        door_entity:
          "{{ (area_entities(area_key) | intersect(label_entities('door')))
          | first | default('none') }}"
        has_door: "{{ door_entity != 'none' }}"
        is_lock_zone: "{{ 'lock_eligible' in area_policy }}"
        registry_entry:
          "{{ (state_attr(g_logic.lighting_off_registry, 'active_timers')
          or {}).get(area_key, {}) }}"
        is_area_locked: "{{ registry_entry.get('locked', false) }}"
        should_trigger_peer:
          "{{ is_door and is_on and area_key != 'none' and adjoining_area
          != 'none' }}"
        hvac_action:
          "{{ state_attr(g_hvac.primary_unit, 'hvac_action') | default('idle')
          }}"
        fan_running: "{{ is_state_attr(g_hvac.primary_unit, 'fan', 'on') }}"
        hvac_is_active: "{{ hvac_action in g_hvac.monitored_states or fan_running }}"
        door_age:
          "{% if has_door and states[door_entity] is not none %}\n  {{ as_timestamp(now())
          - as_timestamp(states[door_entity].last_changed, 0) }}\n{% else %}\n  0\n{%
          endif %}\n"
        is_door_closed: "{{ is_state(door_entity, 'off') if has_door else false }}"
        is_privacy_zone: "{{ has_door and 'lock_eligible' in area_policy }}"
        is_ghost:
          "{% if not has_door %} \n  {{ false }}\n{% else %}\n  {{ is_presence
          and is_on and is_door_closed and not is_area_locked and (door_age > 600 or
          hvac_is_active) }}\n{% endif %}\n"
        should_lock_area:
          "{% if not is_privacy_zone %}\n  {{ false }}\n{% else %}\n
          \ {{ is_presence and is_on and is_door_closed and not is_area_locked and door_age
          < 120 }}\n{% endif %}\n"
        should_unlock_area:
          "{% if is_area_locked %}\n   {# Safety: Clear lock if motion
          stops OR if the door is physically opened #}\n   {{ not is_on or (has_door
          and not is_door_closed) }}\n{% else %}\n   {{ false }}\n{% endif %}\n"
    - choose:
        - alias: Veto Log (Ghost Detected)
          conditions:
            - condition: template
              value_template: "{{ is_presence and is_on and is_ghost }}"
          sequence:
            - action: logbook.log
              data:
                name: GPE VETO
                message:
                  "GPE VETO: Ghost in {{ area_key }} (HVAC: {{ hvac_action }}, Door
                  Age: {{ door_age | int }}s, Lock Status: {{ is_area_locked}})"
                entity_id: "{{ source_entity }}"
        - alias: Lock Presence (Sabbatical)
          conditions:
            - condition: template
              value_template: "{{ should_lock_area and not is_area_locked }}"
          sequence:
            - event: lighting_registry_update
              event_data:
                action: lock
                area_key: "{{ area_key }}"
            - action: logbook.log
              data:
                name: GPE LOCKED
                message:
                  "Locked Via {{ 'Motion' if is_presence else 'Portal' }} Room
                  {{ area_key }} (Registry Reset{% if has_door %}, Door Age: {{ door_age
                  | int }}s{% endif %})"
                entity_id: "{{ source_entity }}"
        - alias: Valid Turn On (Anti-Ghosting)
          conditions:
            - condition: template
              value_template:
                "{{ (is_entrance or is_door or (is_presence and not is_area_locked))
                and is_on and not is_ghost }}"
          sequence:
            - event: universal_controller_command
              event_data:
                action_type: light_call
                command_input: turn_on
                area_key: "{{ area_key }}"
                action_value: "{{ final_action_value }}"
                target_label: "{{ final_target_label }}"
                source_device: monitor
            - event: lighting_registry_update
              event_data:
                action: remove
                area_key: "{{ area_key }}"
            - action: logbook.log
              data:
                name: GPE
                message:
                  "Turn On: Via {{'Motion' if is_presence else 'Portal' }} Room
                  {{ area_key }} (Registry Reset, Door Age: {{ door_age | int }}s)"
                entity_id: "{{ source_entity }}"
            - if:
                - condition: template
                  value_template: "{{ is_door and has_presence_capability }}"
              then:
                - event: lighting_registry_update
                  event_data:
                    action: add
                    area_key: "{{ area_key }}"
                    seconds: 10
                    timestamp: "{{ event_ts }}"
        - alias: Presence Cleared (Start Cleaner)
          conditions:
            - condition: template
              value_template: "{{ is_presence and not is_on and not is_area_locked }}"
          sequence:
            - event: lighting_registry_update
              event_data:
                action: add
                area_key: "{{ area_key }}"
                seconds: "{{ 120 if has_presence_capability else 1800 }}"
                skip_warning: "{{ not is_lock_zone }}"
                timestamp: "{{ event_ts }}"
            - event: start_registry_cleaner
            - action: logbook.log
              data:
                name: "GPE Start "
                message:
                  'GPE: Start Cleaner {{ area_key }} Seconds: "{{ 120 if has_presence_capability
                  else 1800 }}" Skip Warning: "{{ not is_lock_zone }}"'
                entity_id: "{{ source_entity }}"
        - alias: Door Closed Timer Reset
          conditions:
            - condition: template
              value_template: "{{ is_door and not is_on }}"
          sequence:
            - event: lighting_registry_update
              event_data:
                action: add
                area_key: "{{ area_key }}"
                seconds: "{{ 30 if has_presence_capability else 5 }}"
                skip_warning: "{{ not is_lock_zone }}"
                timestamp: "{{ event_ts }}"
            - action: logbook.log
              data:
                name: GPE Add
                message:
                  'GPE: Door Warning {{ area_key }} seconds: "{{ 30 if has_presence_capability
                  else 5 }}" skip_warning: "{{ not is_lock_zone }}"'
                entity_id: "{{ source_entity }}"
        - alias: Presence Update (Door Open)
          conditions:
            - condition: template
              value_template:
                "{{ is_presence and is_on and (not has_door or not is_door_closed
                ) }}"
          sequence:
            - event: lighting_registry_update
              event_data:
                action: add
                area_key: "{{ area_key }}"
                seconds: 120
                timestamp: "{{ event_ts }}"
            - action: logbook.log
              data:
                name: GPE Add
                message: "GPE: Reset {{ area_key }} Time Added 120s"
                entity_id: "{{ source_entity }}"
        - alias: Safety Unlock (Self-Healing)
          conditions:
            - condition: template
              value_template: "{{ should_unlock_area }}"
          sequence:
            - event: lighting_registry_update
              event_data:
                action: remove
                area_key: "{{ area_key }}"
              enabled: false
    - if:
        - condition: template
          value_template: "{{ should_trigger_peer }}"
      then:
        - event: universal_controller_command
          event_data:
            action_type: light_call
            command_input: turn_on
            area_key: "{{ adjoining_area }}"
            action_value: "{{ final_action_value }}"
            source_device: peer_preheat
  mode: parallel
  max: 20

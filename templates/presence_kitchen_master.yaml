trigger:
  - trigger: state
    entity_id:
      - binary_sensor.kitchen_person
      - binary_sensor.kitchen_presence_sensor
binary_sensor:
  - name: "Kitchen Presence Master"
    unique_id: kitchen_presence_master_001
    device_class: presence
    state: >
      {{ is_state('binary_sensor.kitchen_person', 'on') or 
        is_state('binary_sensor.kitchen_presence_sensor', 'on') }}

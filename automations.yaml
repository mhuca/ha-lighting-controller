- id: '1771586583381'
  alias: Lutron Pico - Pico Registry Update
  description: Single, double, and long press detection
  triggers:
  - trigger: event
    event_type: lutron_caseta_button_event
    event_data:
      action: press
  conditions:
  - condition: template
    value_template: '{{ not is_owned or is_expired }}'
  actions:
  - event: lutron_button_event
    event_data:
      device_id: '{{ device_id }}'
      isOwned: true
      owned_ts: '{{ as_timestamp(trigger.event.time_fired) }}'
  - variables:
      device_id: '{{ trigger.event.data.device_id | default(''none'') }}'
      session_id: '{{ trigger.event.context.id | default(''none'') }}'
      button_type: '{{ trigger.event.data.button_type | default(''unknown'') }}'
      target_device_name: "{{ trigger.event.data.device_name \n  | lower \n  | replace('
        ','_') \n  | regex_replace(find='\\\\d+', replace='') \n  | default('unknown')
        }}\n"
      serial: '{{ trigger.event.data.serial | default(0) }}'
      sensor_entity: sensor.pico_config_{{ serial | string }}
      isCommission: '{{ has_value(sensor_entity) and state_attr(sensor_entity, ''config'')
        not in [none, '''', ''unknown''] }}'
      target_label: '{{ [] if target_device_name == ''remote'' else [target_device_name]
        }}'
      button_number: '{{ trigger.event.data.button_number | default(0) }}'
      command_map: '{% set entity = sensor_entity | default(''none'') %} {{ state_attr(entity,
        ''config'') }}

        '
  - if:
    - condition: template
      value_template: '{{ isCommission }}'
    then:
    - alias: Wait for first Release Event... If None After 450ms then it's Hold
      wait_for_trigger:
      - event_type: lutron_caseta_button_event
        event_data:
          serial: '{{ serial | default(0) }}'
          device_id: '{{ device_id }}'
          button_number: '{{ button_number | default(0) }}'
          action: release
        id: release_event
        trigger: event
      timeout:
        hours: 0
        minutes: 0
        seconds: 0
        milliseconds: 500
      continue_on_timeout: true
    - variables:
        is_hold: '{{ wait.trigger is none }}'
    - if:
      - condition: template
        value_template: '{{ not is_hold }}'
      then:
      - wait_for_trigger:
        - event_type: lutron_caseta_button_event
          event_data:
            serial: '{{ serial | default(0) }}'
            button_number: '{{ button_number | default(0) }}'
            action: press
          id: press_event
          trigger: event
        timeout:
          milliseconds: 250
        continue_on_timeout: true
        alias: Wait For Second Press
      - variables:
          is_double: '{{ wait.trigger is not none }}'
      - if:
        - condition: template
          value_template: '{{ is_double }}'
        then:
        - variables:
            command: double
          alias: Dedicated Double Variables
        else:
        - variables:
            command: press
          alias: Dedicated Press Variables
      else:
      - variables:
          command: hold
          command_type: "{{ trigger.event.data.button_type  \n  | lower \n  | replace('
            ', '') \n  | replace('_', '') }}_{{ command }}\n"
          action_map: '{{ command_map.get(command,{}) }}'
          cmd: '{{ action_map.get(button_number | string , {}) }}'
        alias: Dedicated Hold Variables
      - variables:
          repeat_delay: '{{ 125 if cmd.type == ''media_call'' else 500 }}'
          max_hold_time: 9
          max_iterations: '{{ (max_hold_time / (repeat_delay / 1000)) | round(0) }}'
        alias: Dedicated Repeat Variables
      - repeat:
          until:
          - condition: template
            value_template: '{{ wait.trigger is not none or repeat.index > max_iterations
              }}'
          sequence:
          - alias: Hold Event
            event: universal_controller_command
            event_data:
              source_device: pico
              action_type: '{{ cmd.type | default(none) }}'
              action_value: '{{ cmd.value | default(none) }}'
              command_input: '{{ cmd.action | default(none) }}'
              area_key: '{{ area_id(device_id) | default(none) }}'
              target_label: '{{ target_label }}'
              session_id: '{{ session_id }}'
              data_payload: '{{ trigger.event.data }}'
              overrides: '{}'
              command: '{{ command }}'
              command_type: '{{ command_type }}'
            enabled: true
          - wait_for_trigger:
            - event_type: lutron_caseta_button_event
              event_data:
                serial: '{{ serial | default(0) }}'
                device_id: '{{ device_id }}'
                button_number: '{{ button_number | default(0) }}'
                action: release
              trigger: event
            timeout:
              hours: 0
              minutes: 0
              seconds: 0
              milliseconds: '{{ repeat_delay | int }}'
            continue_on_timeout: true
          - variables:
              is_hold: '{{ wait.trigger is none }}'
              hold_duration: '{% set end = as_timestamp(wait.trigger.event.time_fired)
                if wait.trigger is not none else as_timestamp(now()) %} {{ (end -
                start_ts) | round(3) }}

                '
        enabled: true
      - variables:
          command: release
    - variables:
        command_type: "{{ trigger.event.data.button_type  \n  | lower \n  | replace('
          ', '') \n  | replace('_', '') }}_{{ command }}\n"
        action_map: '{{ command_map.get(command,{}) }}'
        cmd: '{{ action_map.get(button_number | string , none ) }}'
    else:
    - variables:
        cmd:
          type: pico_commission
          value: ''
          action: broadcast
  - if:
    - condition: template
      value_template: '{{ cmd is not none }}'
    then:
    - alias: Press Event
      event: universal_controller_command
      event_data:
        source_device: pico
        action_type: '{{ cmd.type | default(none) }}'
        action_value: '{{ cmd.value | default(none) }}'
        command_input: '{{ cmd.action | default(none) }}'
        area_key: '{{ area_id(device_id) | default(none) }}'
        target_label: '{{ target_label }}'
        session_id: '{{ session_id }}'
        data_payload: '{{ trigger.event.data }}'
        overrides: '{}'
        command: '{{ command }}'
        command_type: '{{ command_type }}'
      enabled: true
    - action: logbook.log
      data:
        name: UCC_SENT
        message: 'Area: {{ area_id(device_id) | default(none) }} | Action: {{cmd.type
          | default('''') }} | Value: {{cmd.value | default('''') }} | Label: {{ target_label[0]
          }} | Config: {{sensor_entity | default('''') }}'
        entity_id: sensor.ucc_registry_log
  - event: lutron_button_event
    event_data:
      device_id: '{{ device_id }}'
      isOwned: false
      owned_ts: '{{ as_timestamp(now()) }}'
  mode: parallel
  variables:
    session_id: '{{ trigger.event.context.id }}'
    sessions: '{{ state_attr(''sensor.pico_registry'', ''active_sessions'') | default({})
      }}'
    device_id: '{{ trigger.event.data.device_id | default(''none'') }}'
    session: '{{ sessions.get(device_id, {}) }}'
    is_owned: '{{ session.isOwned | default(false) }}'
    start_ts: '{{ as_timestamp(trigger.event.time_fired) | default(as_timestamp(now()))
      }}'
    is_expired: '{{start_ts >= (session.expiry | default(0)) }}'
  max: 10

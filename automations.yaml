  triggers:
  - entity_id:
    - binary_sensor.living_room_presence_occupancy
    to:
    - 'off'
    for:
      minutes: 5
    trigger: state
    id: Occupancy_Clear
  - entity_id:
    - binary_sensor.living_room_presence_occupancy
    - binary_sensor.basement_true_occupancy
    to:
    - 'off'
    for:
      minutes: 5
    trigger: state
    id: Occupancy_Clear
    enabled: false
  - entity_id:
    - binary_sensor.living_room_presence_occupancy
    to:
    - 'on'
    trigger: state
    id: Occupancy_Detected
  - entity_id:
    - binary_sensor.living_room_presence_occupancy
    - binary_sensor.basement_true_occupancy
    to:
    - 'on'
    trigger: state
    id: Occupancy_Detected
    enabled: false
  conditions: []
  actions:
  - variables:
      area_key: '{{ area_id(trigger.to_state.entity_id) }}'
      options: "{{ states.script \n   | selectattr('entity_id', 'in', area_entities(area_key))\n
        \  | selectattr('entity_id', 'in', label_entities('lighting'))\n   | map(attribute='entity_id')
        | list | sort }}\n"
      state_topic: home/lighting/{{ area_key }}/current_scene
      all_states: '{{ state_attr(''sensor.mqtt_scene_tracker'', ''data'') | default({},
        true) }}'
      current_state_obj: '{{ all_states.get(area_key, {''state'': options[0], ''last_changed'':
        as_datetime(0).isoformat()}) }}'
      current_script: '{{ current_state_obj.state }}'
      last_changed: '{{ current_state_obj.last_changed }}'
      current_idx: '{{ options.index(current_script) if current_script in options
        else -1 }}'
  - choose:
    - conditions:
      - condition: trigger
        id:
        - Occupancy_Clear
      sequence:
      - action: script.turn_on
        target:
          entity_id: '{{ options[0] }}'
        data: {}
    - conditions:
      - condition: trigger
        id:
        - Occupancy_Detected
      sequence:
      - action: script.turn_on
        target:
          entity_id: '{{ options[current_idx] }}'
        data: {}
  mode: single

- id: '1771459793961'
  alias: 'Bridge Export: Universal Controller Command'
  description: ''
  triggers:
  - event_type: universal_controller_command
    trigger: event
    event_data:
      command_input: broadcast
  conditions:
  - condition: template
    value_template: '{{ trigger.event.data.controller_id is not defined }}'
  actions:
  - variables:
      payload: '{{ dict(trigger.event.data, controller_id = ''lighting_primary'')  |
        to_json  }}

        '
  - data:
      topic: home/universal/bus
      payload: '{{ payload }}

        '
    action: mqtt.publish
- id: '1771460330281'
  alias: 'Bridge Import: Universal Controller Command'
  description: ''
  triggers:
  - trigger: mqtt
    options:
      topic: home/universal/bus
  conditions:
  - condition: template
    value_template: '{{ (trigger.payload | from_json).controller_id != ''lighting_primary''
      }}'
  actions:
  - variables:
      payload: '{{ trigger.payload }}'
  - event: universal_controller_command
    event_data:
      controller_id: '{{ payload.controller_id }}'
      source_device: '{{ payload.source_device }}'
      action_type: '{{  payload.action_type }}'
      action_value: '{{  payload.action_value }}'
      command_input: '{{  payload.command_input }}'
      area_key: '{{  payload.area_key }}'
      target_label: '{{ payload.target_label }}'
      data_payload: '{{ payload.data_payload }}'
- id: '1771474376945'
  alias: Light Call - Turn On
  description: ''
  triggers:
  - trigger: event
    id: UCC_Event
    event_type: universal_controller_command
    event_data:
      action_type: light_call
      command_input: turn_on
    enabled: true
  - trigger: event
    id: eUCC_Event
    event_type: esphome.universal_controller_command
    event_data:
      action_type: light_call
      command_input: turn_on
    enabled: true
  - trigger: mqtt
    id: MQTT_Message
    options:
      topic: home/universal/bus
      payload: light_call
      value_template: '{{ value_json.action_type }}'
  conditions: []
  actions:
  - alias: Intent and Context
    variables:
      payload: '{{ trigger.payload if trigger.id == ''MQTT_Message'' else trigger.event.data
        }}'
      action_val: '{{ payload.action_value | default('''') }}'
      area_key: '{{ payload.area_key }}'
      target_kelvin: '{{ states(''sensor.cct_calculation'') | int(3200) }}'
      val: '{{ payload.target_label | default([], true) }}'
      target_labels: "{{ ( [val] if val is string else val) \n  | map('label_entities')
        \n  | sum(start=[]) \n  | unique \n  | list \n}}\n"
  - alias: Data Constants
    variables:
      dim_factor: 20
      command_map:
        max:
          brightness: 255
        raise:
          brightness_step: 35
        lower:
          brightness_step: -35
        min:
          brightness: 25
        night_mode:
          brightness: 90
        day_mode:
          brightness: 190
        release:
          brightness_step: 0
      payload: {}
  - alias: Hardware Bucketing and Target Expansion (The "Engine")
    variables:
      area_lights: '{{ area_entities(area_key) | select(''match'', ''light.*'') |
        list }}'
      target_entities: "{% if target_labels | length > 0 %}\n    {{ area_lights |
        intersect(target_labels) }}\n  {% else %}\n    {{ area_lights }}\n  {% endif
        %}\n"
      target_br: "{% set current_cmd = command_map.get(action_val, {}) %} {% if 'brightness_step'
        in current_cmd %}\n  {{ 255 if current_cmd.brightness_step > 0 else 1 }}\n{%
        elif action_val is number or (action_val | is_number) %}\n  {{ ([0, action_val
        | int, 255] | sort)[1] }}\n{% else %}\n  {{ current_cmd.get('brightness',
        190) }}\n{% endif %}\n"
      step_val: '{{ command_map.get(action_val, {}).get(''brightness_step'', 0) }}'
      ikea_cct_lights: "{% set ns = namespace(to_update=[]) %} \n{% for l in states.light
        \n  | selectattr('entity_id', 'in', target_entities) \n    if l.attributes.get('max_color_temp_kelvin',
        0) | int <= 4000 \n   and 'color_temp' in l.attributes.get('supported_color_modes',
        []) %}\n      {% set cur_k = l.attributes.get('color_temp_kelvin', 0) | int(0)
        %}\n      {% set cur_br = l.attributes.get('brightness', 0) | int(0) %}\n
        \     {% set clamped_k = ([l.attributes.get('min_color_temp_kelvin', 2202)
        | int, target_kelvin, 4000] | sort)[1] %}\n      {% if (cur_k - clamped_k)
        | abs > 50 or (cur_br - target_br) | abs > 3 %}\n        {% set ns.to_update
        = ns.to_update + [l.entity_id] %}\n      {% endif %}\n{% endfor %} {{ ns.to_update
        }}\n"
      standard_cct_lights: "{% set ns = namespace(to_update=[]) %} {% for l in states.light
        | selectattr('entity_id', 'in', target_entities) \n   if l.entity_id not in
        ikea_cct_lights\n   and 'color_temp' in l.attributes.get('supported_color_modes',
        []) %}\n  {% set cur_k = l.attributes.get('color_temp_kelvin', 0) | int(0)
        %}\n  {% set cur_br = l.attributes.get('brightness', 0) | int(0) %}\n  {%
        set min_hw = l.attributes.get('min_color_temp_kelvin', 2200) | int %}\n  {%
        set max_hw = l.attributes.get('max_color_temp_kelvin', 7000) | int %}\n  {%
        set clamped_k = ([min_hw, target_kelvin, max_hw] | sort)[1] %}\n  {% if (cur_k
        - clamped_k) | abs > 50 or (cur_br - target_br) | abs > 3 %}\n    {% set ns.to_update
        = ns.to_update + [l.entity_id] %}\n  {% endif %}\n{% endfor %} {{ ns.to_update
        }}\n"
      dimmer_lights: "{{ target_entities \n  | intersect(label_entities('CurrentCTDimmer'))
        \n  | list }}\n"
      binary_lights: "{% set all_binary_lights = states.light \n    | selectattr('attributes.supported_color_modes',
        'defined')\n    | selectattr('attributes.supported_color_modes', 'eq', ['onoff'])\n
        \   | map(attribute='entity_id') | list %}\n{{ target_entities | intersect(all_binary_lights)
        }}\n"
      excluded: '{{ ikea_cct_lights + standard_cct_lights + dimmer_lights + binary_lights
        | list | default([]) }}'
      standard_lights: "{{ target_entities \n  | reject('in', excluded ) \n  | list
        }}\n"
  - parallel:
    - alias: IKEA CCT Turn On
      if:
      - condition: template
        value_template: '{{ ikea_cct_lights | length > 0 }}'
      then:
      - action: light.turn_on
        target:
          entity_id: '{{ ikea_cct_lights }}'
        data: '{% set base_data = {''color_temp_kelvin'': target_kelvin} %}

          {{ dict(base_data, brightness_step=step_val) if step_val != 0 else dict(base_data,
          brightness=target_br) }}

          '
    - alias: Standard CCT Turn On
      if:
      - condition: template
        value_template: '{{ standard_cct_lights | length > 0 }}'
      then:
      - action: light.turn_on
        target:
          entity_id: '{{ standard_cct_lights }}'
        data: '{% set base_data = {''color_temp_kelvin'': target_kelvin} %} {{ dict(base_data,
          brightness_step=step_val) if step_val != 0 else dict(base_data, brightness=target_br)
          }}

          '
    - alias: Dimmer Lights Turn On
      if:
      - condition: template
        value_template: '{{ dimmer_lights | length > 0 }}'
      then:
      - action: light.turn_on
        target:
          entity_id: '{{ dimmer_lights }}'
        data:
          brightness: '{{ states(''sensor.cct_to_brightness'') | int(150) }}'
    - alias: Binary Lights Turn On
      if:
      - condition: template
        value_template: '{{ binary_lights | length > 0 }}'
      then:
      - action: light.turn_on
        target:
          entity_id: '{{ binary_lights }}'
        data: {}
    - alias: Standard Lights Turn On
      if:
      - condition: template
        value_template: '{{ standard_lights | length > 0 }}'
      then:
      - action: light.turn_on
        target:
          entity_id: '{{ standard_lights }}'
        data: '{% set base_data = {} %}

          {{ dict(base_data, brightness_step=step_val) if step_val != 0 else dict(base_data,
          brightness=target_br) }}

          '
  - action: logbook.log
    data:
      name: Light Engine (On)
      message: 'Light Call Source: {{ payload.source_device | default('''') }} | Area:
        {{ area_key }} | Label: {{ val[0] | default(''All'') }} | color_temp_kelvin:
        {{ target_kelvin }} {{this.entity_id}}'
      entity_id: sensor.ucc_registry_log
  mode: queued
  max: 20
- id: '1771475160937'
  alias: Light Call - Turn Off
  description: ''
  triggers:
  - trigger: event
    id: UCC_Event
    event_type: universal_controller_command
    event_data:
      action_type: light_call
      command_input: turn_off
    enabled: true
  - trigger: event
    id: eUCC_Event
    event_type: esphome.universal_controller_command
    event_data:
      action_type: light_call
      command_input: turn_off
    enabled: true
  - trigger: mqtt
    id: MQTT_Message
    options:
      topic: home/universal/bus
      payload: light_call
      value_template: '{{ value_json.action_type }}'
  conditions: []
  actions:
  - alias: Define Actions
    variables:
      payload: '{{ trigger.payload if trigger.id == ''MQTT_Message'' else trigger.event.data
        }}'
      area_key: '{{ payload.area_key }}'
      command: '{{ payload.command_input }}'
      action_type: '{{ payload.action_type }}'
      action_value: '{{ payload.action_value }}'
  - variables:
      transition: 0.2
      labels: "{{ trigger.event.data.target_label \n  | lower \n  | default([], true)\n}}\n"
      target_labels: "{{ ( [labels] if labels is string else labels ) \n  | map('label_entities')
        \n  | sum(start=[]) \n  | unique \n  | list \n}}\n"
      is_whole_area: '{{ labels | length == 0 }}'
      area_lights: '{{ area_entities(area_key) | select(''match'', ''light.*'') |
        list }}'
      expanded_targets: '{{ area_lights | intersect(target_labels) if target_labels
        | length > 0 else area_lights }}

        '
      final_targets: "{{ states.light \n  | selectattr('entity_id', 'in', expanded_targets)
        \n  | rejectattr('state', 'eq', 'off') \n  | map(attribute='entity_id') \n
        \ | list }}\n"
      final_target_data: "{% if is_whole_area %}\n  {{ {\"area_id\": area_key} }}\n{%
        else %}\n  {{ {\"entity_id\": final_targets} }}\n{% endif %}\n"
      log_nominee: "{% if final_targets | length > 0 %}\n  {{ final_targets | first
        }}\n{% else %}\n  {% set main_light = area_lights | intersect(label_entities('main'))
        | first | default('none') %}\n  {{ main_light if main_light != 'none' else
        (area_lights | first | default('sensor.ucc_registry_log')) }}\n{% endif %}\n"
      telemetry: '{% set t_id = trigger.id | default(''Event'') %}

        {% set src = payload.source_device | default(''unknown'') %}

        [ID: {{ t_id }} | Src: {{ src }} | Val: {{ action_value | default(''none'')
        }}]

        '
  - if:
    - condition: template
      value_template: '{{ final_target_data.area_id is defined or (final_target_data.entity_id
        is defined and final_target_data.entity_id | length > 0) }}'
    then:
    - action: light.turn_off
      target: '{{ final_target_data }}'
      data: {}
    - action: logbook.log
      data:
        name: Light Engine (Off)
        message: 'Turned off {{ final_targets | length }} lights in {{ area_key }}.
          (Source: {{ payload.source_device | default('''') }}) {{this.entity_id}}
          {{ telemetry }}'
        entity_id: sensor.ucc_registry_log
    - action: logbook.log
      data:
        name: Light Engine (Off)
        message: 'Turned off {{ final_targets | length }} lights in {{ area_key }}.
          (Source: {{ payload.source_device | default('''') }}) {{this.entity_id}}
          {{ telemetry }}'
        entity_id: '{{ log_nominee }}'
    else:
    - alias: Silent Skip
      stop: All target lights are already off. Mesh silenced.
  mode: queued
  max: 20
- id: '1771475504554'
  alias: Command - Light Scene Cycle
  description: Handles scene rotation using Raise/Lower/Max/Min/Next
  triggers:
  - trigger: event
    id: UCC_Event
    event_type: universal_controller_command
    event_data:
      action_type: scene_cycle
  - trigger: mqtt
    id: MQTT_Message
    options:
      topic: home/universal/bus
      payload: scene_cycle
      value_template: '{{ value_json.action_type }}'
  actions:
  - variables:
      payload: '{{ trigger.payload if trigger.id == ''MQTT_Message'' else trigger.event.data
        }}'
      area_key: '{{ payload.area_key }}'
      command_input: '{{ payload.command_input }}'
      intent: "{% if command_input == 'turn_off' %}\n  off\n{% elif payload.action_value
        == '' %}\n  max\n{% else %}\n  {{ payload.action_value }}\n{% endif %}\n"
      options: "{{ states.script \n   | selectattr('entity_id', 'in', area_entities(area_key))\n
        \  | selectattr('entity_id', 'in', label_entities('lighting'))\n   | map(attribute='entity_id')
        | list | sort }}\n"
      state_topic: home/lighting/{{ area_key }}/current_scene
      all_states: '{{ state_attr(''sensor.mqtt_scene_tracker'', ''data'') | default({},
        true) }}'
      current_state_obj: '{{ all_states.get(area_key, {''state'': options[0], ''last_changed'':
        as_datetime(0).isoformat()}) }}'
      current_script: '{{ current_state_obj.state }}'
      last_changed: '{{ current_state_obj.last_changed }}'
      current_idx: '{{ options.index(current_script) if current_script in options
        else -1 }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ intent == ''max'' }}'
      sequence:
      - variables:
          idx: '{{ -1 | int }}'
      alias: Maximum - Max
    - conditions:
      - condition: template
        value_template: '{{ intent in [''next'', ''raise''] }}'
      sequence:
      - variables:
          idx: '{{ -1 if current_idx >= (options | length - 1) else current_idx +
            1 }}'
      alias: Next - Raise
    - conditions:
      - condition: template
        value_template: '{{ intent in [''lower'',''previous''] }}'
      sequence:
      - variables:
          idx: '{{ 0 if current_idx <= 0 else current_idx - 1 }}'
      alias: Previous - Lower
    - conditions:
      - condition: template
        value_template: '{{ intent == ''min'' }}'
      sequence:
      - variables:
          idx: '{{ 1 | int }}'
      alias: Minimum -  Min
    - conditions:
      - condition: template
        value_template: '{{ intent == ''off'' }}'
      sequence:
      - variables:
          idx: '{{ 0 | int }}'
      alias: 'Off'
    default:
    - variables:
        idx: '{{ 1 | int }}'
  - action: script.turn_on
    target:
      entity_id: '{{ options[idx] }}'
    data: {}
  - action: mqtt.publish
    data:
      topic: '{{ state_topic }}'
      payload: "{{ {\n  \"state\": options[idx],\n  \"last_changed\": now().isoformat()\n}
        | to_json }}"
      retain: true
  - action: logbook.log
    data:
      name: Light Scene
      message: 'Light Scene: {{ options[idx]}} by: {{ payload.source_device }} | Area:
        {{ area_key }}'
      entity_id: sensor.ucc_registry_log
  - if:
    - condition: template
      value_template: '{{ current_idx != idx }}'
    then: []
  mode: parallel
- id: '1771536475110'
  alias: 'Adaptive Lighting: Sync Active CCT & Dimmer Targets'
  description: Syncs active lights to solar targets with deadzone checks to minimize  network
    chatter and accommodate legacy hardware.
  triggers:
  - trigger: state
    entity_id: sensor.cct_calculation
    id: target_change
    for: 00:00:10
  actions:
  - variables:
      target_kelvin: '{{ states(''sensor.cct_calculation'') | int(3200) }}'
      target_br_dimmer: '{{ states(''sensor.cct_to_brightness'') | int(150) }}'
      native_cct_targets: "{% set ns = namespace(targets=[]) %}\n{% for l in states.light
        | selectattr('state', 'eq', 'on') %}\n  {% set modes = l.attributes.get('supported_color_modes',
        []) %}\n  {% if 'color_temp' in modes %}\n    {% set cur_k = l.attributes.get('color_temp_kelvin',
        0) | int(0) %}\n    {% set min_k = l.attributes.get('min_color_temp_kelvin',
        2000) | int(2000) %}\n    {% set max_k = l.attributes.get('max_color_temp_kelvin',
        9000) | int(9000) %}\n    {% if (cur_k - target_kelvin) | abs > 50 \n       and
        target_kelvin >= min_k \n       and target_kelvin <= max_k %}\n      {% set
        ns.targets = ns.targets + [l.entity_id] %}\n    {% endif %}\n  {% endif %}\n{%
        endfor %}\n{{ ns.targets }}\n"
      dimmer_targets: "{% set ns = namespace(targets=[]) %}\n{% set labeled = label_entities('CurrentCTDimmer')
        %}\n{% for l in states.light | selectattr('entity_id', 'in', labeled) | selectattr('state',
        'eq', 'on') %}\n  {% set cur_br = l.attributes.get('brightness', 0) | int
        %}\n  {% if (cur_br - target_br_dimmer) | abs > 5 %}\n    {% set ns.targets
        = ns.targets + [l.entity_id] %}\n  {% endif %}\n{% endfor %}\n{{ ns.targets
        }}\n"
  - parallel:
    - alias: Update Native Kelvin Lights
      if:
      - condition: template
        value_template: '{{ native_cct_targets | length > 0 }}'
      then:
      - action: light.turn_on
        target:
          entity_id: '{{ native_cct_targets }}'
        data:
          color_temp_kelvin: '{{ target_kelvin }}'
    - alias: Update Dim-2-Temp Groups (Legacy Compatible)
      if:
      - condition: template
        value_template: '{{ dimmer_targets | length > 0 }}'
      then:
      - action: light.turn_on
        target:
          entity_id: '{{ dimmer_targets }}'
        data:
          brightness: '{{ target_br_dimmer }}'
- id: '1771546449673'
  alias: Switch Amryl Office Main Switch Event
  description: Single press detection for Amryl Office Main Light
  triggers:
  - trigger: mqtt
    options:
      topic: zigbee2mqtt/+
  conditions:
  - condition: template
    value_template: "{% set payload = trigger.payload_json %}\n{{ payload.action is
      defined and \n   payload.detach_relay_mode is defined and \n   payload.detach_relay_mode
      == true }}\n"
  actions:
  - variables:
      payload: '{{ trigger.payload_json }}'
      device_name: '{{ trigger.topic.split(''/'')[1] }}'
      area_key: '{{ device_name.lower().replace(''relay'', '''').strip().replace(''
        '', ''_'') }}'
      target_light: "{{ label_entities('main') \n   | select('match', 'light\\.')\n
        \  | select('in', area_entities(area_key)) \n   | first | default('none')
        }}\n"
      intended_command: '{{ ''turn_off'' if is_state(target_light, ''on'') else ''turn_on''
        }}'
  - condition: template
    value_template: '{{ target_light != ''none'' }}'
  - alias: Emit Generic Universal Controller Command Event
    event: universal_controller_command
    event_data:
      source_device: z2m_physical_rocker
      action_type: light_call
      action_value: ''
      command_input: '{{ intended_command }}'
      target_label:
      - main
      area_key: '{{ area_key }}'
      data_payload: '{{ payload }}'
      overrides: {}
  - data:
      name: UCC_SENT
      message: 'Area: {{ area_key }} | Action: light_call | Value: {{ target_light
        }}'
      entity_id: sensor.ucc_registry_log
    action: logbook.log
  - delay:
      hours: 0
      minutes: 0
      seconds: 0
      milliseconds: 250
  mode: single
- id: '1771584229704'
  alias: Powder Room Presence Logic (Dim Warning)
  description: ''
  triggers:
  - entity_id: binary_sensor.powder_room_motion
    to: 'on'
    trigger: state
    id: Motion_On
  - entity_id:
    - binary_sensor.powder_room_motion
    to:
    - 'off'
    trigger: state
    id: Motion_Off
    for:
      hours: 0
      minutes: 15
      seconds: 0
  - entity_id:
    - binary_sensor.powder_room_door
    trigger: state
    to:
    - 'on'
    id: Door_Open
  - entity_id:
    - binary_sensor.powder_room_door
    trigger: state
    to:
    - 'off'
    id: Door_Closed
  - trigger: state
    entity_id:
    - switch.powder_room_relay
    id: Manual_Toggle
    from:
    to:
  conditions: []
  actions:
  - parallel:
    - choose:
      - conditions:
        - condition: trigger
          id:
          - Motion_On
          - Door_Open
        - condition: template
          value_template: '{% set current = state_attr(''sensor.active_area_overrides'',
            ''overridden_areas'') or [] %}

            {{ not ''powder_room'' in current }}'
        sequence:
        - alias: Emit Generic Universal Controller Command Event
          event: universal_controller_command
          event_data:
            source_device: presence
            action_type: light_call
            action_value: '{{ ''night_mode'' if is_state(''binary_sensor.night_light_sensor''
              ,''on'') else ''day_mode'' }}

              '
            area_key: powder_room
            command_input: turn_on
            target_label:
            - main
            data_payload: '{{ trigger }}'
            overrides: {}
        - alias: IsDoorOpen
          if:
          - condition: state
            entity_id: binary_sensor.powder_room_door
            state:
            - 'on'
          then:
          - delay:
              hours: 0
              minutes: 2
              seconds: 0
              milliseconds: 0
          - alias: Emit Generic Universal Controller Command Event
            event: universal_controller_command
            event_data:
              source_device: presence
              action_type: light_call
              action_value: ''
              command_input: turn_off
              target_label:
              - main
              area_key: powder_room
              data_payload: '{{ trigger }}'
              overrides: {}
          - event: universal_controller_command
            event_data:
              action_type: light_override
              area_key: powder_room
              command_input: 'off'
              data_payload: '{{ trigger.to_state }}'
          else:
          - stop: Sequence complete - Door Closed
      - conditions:
        - condition: trigger
          id:
          - Door_Closed
        sequence:
        - delay:
            hours: 0
            minutes: 0
            seconds: 5
            milliseconds: 0
        - alias: Wait for Motion
          wait_template: '{{ is_state(''binary_sensor.powder_room_fan_motion'', ''on'')
            }}'
          timeout: 00:00:20
          continue_on_timeout: true
        - condition: template
          value_template: '{{ wait.remaining == 0 }}'
        - alias: Emit Generic Universal Controller Command Event
          event: universal_controller_command
          event_data:
            source_device: presence
            action_type: light_call
            action_value: min
            command_input: turn_on
            target_label:
            - main
            area_key: powder_room
            data_payload: '{{ trigger }}'
            overrides: {}
        - alias: Wait for Motion
          wait_template: '{{ is_state(''binary_sensor.powder_room_fan_motion'', ''on'')
            }}'
          timeout: 00:00:10
          continue_on_timeout: true
        - condition: template
          value_template: '{{ not wait.completed }}'
        - alias: Emit Generic Universal Controller Command Event
          event: universal_controller_command
          event_data:
            source_device: presence
            action_type: light_call
            action_value: ''
            command_input: turn_off
            target_label:
            - main
            area_key: powder_room
            data_payload: '{{ trigger }}'
            overrides: {}
      - conditions:
        - condition: trigger
          id: Manual_Toggle
        - condition: template
          value_template: '{{ trigger.to_state.context.user_id is none and trigger.to_state.context.parent_id
            is none }}'
        sequence:
        - event: universal_controller_command
          event_data:

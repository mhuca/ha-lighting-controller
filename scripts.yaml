basement_stairs_00_all_off:
  sequence:
  - action: light.turn_off
    metadata: {}
    target:
      area_id:
      - basement_stairs
      - basement_kitchen
      - family_room
      - furnace_room
      - gym
      - panel_room
    data: {}
    enabled: false
  - parallel:
    - alias: Universal Controller Command Event - Living Room Wall Down
      event: universal_controller_command
      event_data:
        source_device: light_scene
        action_type: light_call
        action_value: 120
        command_input: turn_on
        target_label:
        - living_room_wall_down_light
        area_key: living_room
        data_payload: ''
        overrides: {}
    - alias: Universal Controller Command Event - Living Room Off
      event: universal_controller_command
      event_data:
        source_device: light_scene
        action_type: light_call
        action_value: ''
        command_input: turn_off
        target_label:
        - living_room_wall_up_light
        - lamp
        - main
        area_key: living_room
        data_payload: ''
        overrides: {}
    - alias: Universal Controller Command Event - Hallway Off
      event: universal_controller_command
      event_data:
        source_device: light_scene
        action_type: light_call
        action_value: ''
        command_input: turn_off
        target_label:
        - back
        - bar
        - ring
        area_key: hallway
        data_payload: ''
        overrides: {}
    - alias: Universal Controller Command Event - Dining Room Off
      event: universal_controller_command
      event_data:
        source_device: light_scene
        action_type: light_call
        action_value: ''
        command_input: turn_off
        target_label:
        - main
        - front
        area_key: dining_room
        data_payload: ''
        overrides: {}
    enabled: false
  - repeat:
      for_each:
      - basement_stairs
      - family_room
      - gym
      - furnace_room
      - panel_room
      - basement_kitchen
      sequence:
      - alias: Universal Controller Command Event - Basement
        event: universal_controller_command
        event_data:
          source_device: light_scene
          action_type: light_call
          action_value: ''
          command_input: turn_off
          target_label: []
          area_key: '{{ repeat.item }}'
          data_payload: ''
          overrides: {}
      - delay:
          hours: 0
          minutes: 0
          seconds: 0
          milliseconds: 500
  fields: {}
  alias: Basement Stairs 00. All Off
  description: ''

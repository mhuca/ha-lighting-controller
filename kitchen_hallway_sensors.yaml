trigger:
  - trigger: state
    entity_id:
      - binary_sensor.hallway_person
      - binary_sensor.kitchen_presence_sensor
      - binary_sensor.kitchen_prep_zone_presence
      - binary_sensor.kitchen_island_presence
  - trigger: homeassistant
    event: start
  - trigger: event
    event_type: event_template_reloaded
binary_sensor:
  - name: "Kitchen Presence Master"
    unique_id: kitchen_presence_master_001
    device_class: presence
    state: >
      {{ is_state('binary_sensor.hallway_person', 'on') or 
        is_state('binary_sensor.kitchen_presence_sensor', 'on') or 
        is_state('binary_sensor.kitchen_prep_zone_presence', 'on') or 
        is_state('binary_sensor.kitchen_island_presence', 'on') }}
    availability: >
      {{ has_value('binary_sensor.hallway_person') }}
    # The 2-minute delay reset logic is handled here
    delay_off:
      minutes: 2

living_room_movie:
  sequence:
  - alias: Universal Controller Command Event - Living Room Wall Down
    event: universal_controller_command
    event_data:
      source_device: light_scene
      action_type: light_call
      action_value: 120
      command_input: turn_on
      target_label:
      - living_room_wall_down_light
      area_key: living_room
      data_payload: ''
      overrides: {}
  - delay:
      hours: 0
      minutes: 0
      seconds: 0
      milliseconds: 250
  - alias: Universal Controller Command Event - Living Room Off
    event: universal_controller_command
    event_data:
      source_device: light_scene
      action_type: light_call
      action_value: ''
      command_input: turn_off
      target_label:
      - living_room_wall_up_light
      - lamp
      - main
      area_key: living_room
      data_payload: ''
      overrides: {}
  - delay:
      hours: 0
      minutes: 0
      seconds: 0
      milliseconds: 250
  - alias: Universal Controller Command Event - Hallway Off
    event: universal_controller_command
    event_data:
      source_device: light_scene
      action_type: light_call
      action_value: ''
      command_input: turn_off
      target_label:
      - back
      - bar
      - ring
      area_key: hallway
      data_payload: ''
      overrides: {}
  - delay:
      hours: 0
      minutes: 0
      seconds: 0
      milliseconds: 250
  - alias: Universal Controller Command Event - Dining Room Off
    event: universal_controller_command
    event_data:
      source_device: light_scene
      action_type: light_call
      action_value: ''
      command_input: turn_off
      target_label: []
      area_key: dining_room
      data_payload: ''
      overrides: {}
  alias: Living Room 10. Movie
  description: ''
  fields: {}
